<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Georgia', 'Garamond', serif;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1b2a 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
        color: #e0e0e0;
      }

      /* Constelaciones de fondo */
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      .container {
        position: relative;
        z-index: 2;
        text-align: center;
        background: rgba(20, 20, 40, 0.7);
        padding: 60px 50px;
        border-radius: 10px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(200, 100, 150, 0.3);
        max-width: 700px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(200, 100, 150, 0.05);
      }

      h1 {
        color: #d4715f;
        font-size: 2.8em;
        margin-bottom: 15px;
        text-shadow: 0 0 30px rgba(212, 113, 95, 0.4);
        font-weight: normal;
        letter-spacing: 2px;
      }

      .subtitle {
        color: #9fa8a3;
        font-size: 1.05em;
        margin-bottom: 50px;
        font-style: italic;
        font-weight: 300;
      }

      .phrase-box {
        min-height: 120px;
        background: linear-gradient(135deg, rgba(212, 113, 95, 0.08) 0%, rgba(100, 50, 80, 0.08) 100%);
        border: 2px solid rgba(212, 113, 95, 0.4);
        border-radius: 8px;
        padding: 40px;
        margin-bottom: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .phrase-box::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(45deg, transparent 30%, rgba(212, 113, 95, 0.1) 50%, transparent 70%);
        pointer-events: none;
      }

      .phrase-text {
        font-size: 1.6em;
        color: #e8d5c4;
        font-weight: 300;
        line-height: 1.8;
        text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 1;
        letter-spacing: 0.5px;
      }

      .buttons-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 18px;
        margin-bottom: 30px;
      }

      button {
        background: linear-gradient(135deg, #8b4545 0%, #c74d4d 50%, #8b3a3a 100%);
        color: #f5e6d3;
        border: 1px solid rgba(212, 113, 95, 0.5);
        padding: 16px 28px;
        border-radius: 6px;
        font-size: 0.95em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.4s ease;
        box-shadow: 0 4px 20px rgba(139, 69, 69, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
        letter-spacing: 0.5px;
        font-family: 'Georgia', serif;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(199, 77, 77, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        background: linear-gradient(135deg, #a05555 0%, #e05f5f 50%, #9d4a4a 100%);
        border-color: rgba(212, 113, 95, 0.8);
      }

      button:active {
        transform: translateY(0px);
        box-shadow: 0 2px 10px rgba(139, 69, 69, 0.6), inset 0 2px 5px rgba(0, 0, 0, 0.3);
      }

      /* Efecto de sangre al presionar */
      button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 200, 200, 0.4);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      button:active::before {
        animation: bleeding 0.7s ease-out;
      }

      @keyframes bleeding {
        to {
          width: 350px;
          height: 350px;
          opacity: 0;
        }
      }

      /* Animación de gotas de sangre */
      .blood-drop {
        position: fixed;
        pointer-events: none;
        z-index: 3;
        font-size: 1.3em;
        animation: drip 3s ease-in forwards;
      }

      @keyframes drip {
        0% {
          opacity: 1;
          transform: translateY(0) translateX(0) scale(1) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: translateY(180px) translateX(var(--tx)) scale(0.3) rotate(360deg);
        }
      }

      /* Animación de luna */
      .moon {
        position: fixed;
        pointer-events: none;
        z-index: 3;
        font-size: 2em;
        animation: float-up 3s ease-in forwards;
      }

      @keyframes float-up {
        0% {
          opacity: 1;
          transform: translateY(0) translateX(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-150px) translateX(var(--tx)) scale(0.5);
        }
      }

      .author {
        color: #9fa8a3;
        margin-top: 15px;
        font-size: 0.9em;
        font-style: italic;
        opacity: 0.8;
      }

      .success-message {
        color: #d4715f;
        margin-top: 20px;
        font-size: 0.95em;
        opacity: 0;
        transition: opacity 0.3s ease;
        text-shadow: 0 0 10px rgba(212, 113, 95, 0.3);
      }

      .success-message.show {
        opacity: 1;
      }

      footer {
        position: absolute;
        bottom: 20px;
        left: 0;
        right: 0;
        text-align: center;
        color: #9fa8a3;
        font-size: 0.9em;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <canvas id="starCanvas"></canvas>
    
    <div class="container">
      <h1>⸻ CONSUMO ⸻</h1>
      <p class="subtitle">El amor que siento.</p>
      
      <div class="phrase-box">
        <p class="phrase-text" id="phrase">Mi devosion por ti</p>
      </div>

      <div class="buttons-container" id="buttonsContainer"></div>

      <div class="success-message" id="successMessage">Consumido por ti</div>
    </div>

    <footer>Te amo, Max.</footer>

    <script>
      const frases = [
        {
          texto: "Te devoraría completo, hasta los huesos. Quiero consumirte lentamente.",
          autor: "Bataille"
        },
        {
          texto: "El amor es hambre. Tengo un apetito infinito por ti.",
          autor: "Poesía visceral"
        },
        {
          texto: "Quisiera ser carne y tú el fuego que me consume sin dejarme morir.",
          autor: "Metáfora del deseo"
        },
        {
          texto: "Te mastico con el pensamiento, te disuelvo en mí como alimento sagrado.",
          autor: "Teología del cuerpo"
        },
        {
          texto: "En ti busco la razón para devorar la vida completa a tu lado.",
          autor: "Hambre existencial"
        },
        {
          texto: "Eres lo único que quiero consumir, lo único que llena mi apetito eterno.",
          autor: "Obsidiana"
        },
        {
          texto: "Quiero que me comas. Que me hagas tuyo hasta la médula.",
          autor: "Vulnerabilidad radical"
        },
        {
          texto: "El amor verdadero es canibalismo consensual: devorarnos mutuamente sin fin.",
          autor: "Filosofía oscura"
        },
        {
          texto: "Te beso como si te comiera, porque cada parte tuya es esencial para vivir.",
          autor: "Necesidad primaria"
        },
        {
          texto: "Quiero fermentarme en ti, descomponerme en tu presencia hasta ser uno.",
          autor: "Disolución del yo"
        },
        {
          texto: "El amor es la necesidad de tragarte entero, de llevarte dentro de mí.",
          autor: "Incorporación del otro"
        },
        {
          texto: "Seríamos caníbales en la noche, devorando nuestras propias almas.",
          autor: "Rito nocturno"
        }
      ];

      // Variables para seguimiento del mouse
      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;

      // Crear constelaciones en el canvas
      const canvas = document.getElementById('starCanvas');
      const ctx = canvas.getContext('2d');

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const stars = [];
      const numStars = 120;

      // Generar estrellas aleatorias
      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.2,
          opacity: Math.random() * 0.6 + 0.3,
          originalX: 0,
          originalY: 0
        });
      }

      // Guardar posiciones originales
      stars.forEach(star => {
        star.originalX = star.x;
        star.originalY = star.y;
      });

      // Dibujar constelaciones
      function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar estrellas
        stars.forEach(star => {
          ctx.fillStyle = `rgba(220, 200, 180, ${star.opacity})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          ctx.fill();
        });

        // Conectar estrellas cercanas con líneas más visibles
        for (let i = 0; i < stars.length; i++) {
          for (let j = i + 1; j < stars.length; j++) {
            const dx = stars[i].x - stars[j].x;
            const dy = stars[i].y - stars[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 180) {
              // Hacer las líneas más visibles y brillantes
              const opacity = Math.max(0.1, 0.4 * (1 - distance / 180));
              ctx.strokeStyle = `rgba(220, 200, 180, ${opacity})`;
              ctx.lineWidth = 1.2;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              
              ctx.beginPath();
              ctx.moveTo(stars[i].x, stars[i].y);
              ctx.lineTo(stars[j].x, stars[j].y);
              ctx.stroke();

              // Efecto de brillo en las líneas
              ctx.strokeStyle = `rgba(255, 220, 200, ${opacity * 0.5})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      // Animar parpadeo de estrellas y seguimiento del mouse
      function animateStars() {
        stars.forEach(star => {
          star.opacity += (Math.random() - 0.5) * 0.08;
          star.opacity = Math.max(0.2, Math.min(0.9, star.opacity));

          // Hacer que las estrellas se muevan hacia el mouse
          const dx = mouseX - star.x;
          const dy = mouseY - star.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance > 50) {
            const moveSpeed = 0.03;
            star.x += (dx / distance) * moveSpeed;
            star.y += (dy / distance) * moveSpeed;
          } else {
            // Si está muy cerca del mouse, volver lentamente a la posición original
            star.x += (star.originalX - star.x) * 0.02;
            star.y += (star.originalY - star.y) * 0.02;
          }
        });
        drawStars();
        requestAnimationFrame(animateStars);
      }

      // Seguir movimiento del mouse
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      // Crear botones dinámicamente
      const container = document.getElementById('buttonsContainer');
      frases.forEach((frase, index) => {
        const button = document.createElement('button');
        button.textContent = `${index + 1}`;
        button.onclick = () => mostrarFrase(index);
        container.appendChild(button);
      });

      // Mostrar frase y generar gotas de sangre
      function mostrarFrase(index) {
        const phraseElement = document.getElementById('phrase');
        const frase = frases[index];
        
        phraseElement.innerHTML = `${frase.texto}<div class="author">— ${frase.autor}</div>`;
        phraseElement.style.animation = 'none';
        setTimeout(() => {
          phraseElement.style.animation = 'fadeIn 0.6s ease-in';
        }, 10);

        // Mostrar mensaje de éxito
        const message = document.getElementById('successMessage');
        message.classList.add('show');
        setTimeout(() => {
          message.classList.remove('show');
        }, 2500);

        // Generar gotas de sangre
        generarGotasSangre(12);
        
        // Generar luna
        generarLuna();
      }

      // Generar gotas de sangre animadas
      function generarGotasSangre(cantidad) {
        const simbolos = ['🩸', '🫀' ,'🩸'];
        for (let i = 0; i < cantidad; i++) {
          const drop = document.createElement('div');
          drop.className = 'blood-drop';
          drop.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
          
          const x = Math.random() * window.innerWidth;
          const y = Math.random() * window.innerHeight * 0.3;
          const tx = (Math.random() - 0.5) * 250;

          drop.style.left = x + 'px';
          drop.style.top = y + 'px';
          drop.style.setProperty('--tx', tx + 'px');

          document.body.appendChild(drop);

          setTimeout(() => {
            drop.remove();
          }, 3000);
        }
      }

      // Generar luna
      function generarLuna() {
        const moon = document.createElement('div');
        moon.className = 'moon';
        moon.textContent = '🌙';
        
        const x = Math.random() * window.innerWidth;
        const y = window.innerHeight;
        const tx = (Math.random() - 0.5) * 200;

        moon.style.left = x + 'px';
        moon.style.top = y + 'px';
        moon.style.setProperty('--tx', tx + 'px');

        document.body.appendChild(moon);

        setTimeout(() => {
          moon.remove();
        }, 3000);
      }

      // Animación de fade in
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fadeIn {
          from { opacity: 0; transform: scale(0.95); }
          to { opacity: 1; transform: scale(1); }
        }
      `;
      document.head.appendChild(style);

      // Redimensionar canvas con la ventana
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      // Iniciar animación
      animateStars();
    </script>
  </body>
</html>
